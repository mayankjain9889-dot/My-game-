<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>SLICE & SPLICE</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bangers&family=Fredoka+One&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; touch-action: none; user-select: none; }

  body {
    background: #0a0015;
    overflow: hidden;
    width: 100vw;
    height: 100vh;
    font-family: 'Fredoka One', cursive;
  }

  canvas {
    display: block;
    width: 100vw;
    height: 100vh;
  }

  /* SPLASH SCREEN */
  #splash {
    position: fixed; inset: 0; z-index: 100;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    background: radial-gradient(ellipse at center, #1a003d 0%, #0a0015 70%);
    overflow: hidden;
  }

  .splash-bg {
    position: absolute; inset: 0;
    background:
      radial-gradient(circle at 20% 30%, rgba(255,100,200,0.15) 0%, transparent 40%),
      radial-gradient(circle at 80% 70%, rgba(100,200,255,0.1) 0%, transparent 40%),
      radial-gradient(circle at 50% 50%, rgba(255,200,0,0.05) 0%, transparent 60%);
    animation: bgPulse 3s ease-in-out infinite alternate;
  }

  @keyframes bgPulse {
    from { opacity: 0.6; }
    to { opacity: 1; }
  }

  .fruit-ring {
    position: absolute;
    width: 320px; height: 320px;
    border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.05);
    display: flex; align-items: center; justify-content: center;
    animation: ringRotate 20s linear infinite;
  }

  @keyframes ringRotate {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }

  .orbit-fruit {
    position: absolute;
    font-size: 2.2rem;
    animation: fruitBob 2s ease-in-out infinite alternate;
    filter: drop-shadow(0 0 12px rgba(255,200,0,0.6));
  }
  .orbit-fruit:nth-child(1) { top: -24px; left: 50%; transform: translateX(-50%); }
  .orbit-fruit:nth-child(2) { top: 50%; right: -24px; transform: translateY(-50%); animation-delay: 0.3s; }
  .orbit-fruit:nth-child(3) { bottom: -24px; left: 50%; transform: translateX(-50%); animation-delay: 0.6s; }
  .orbit-fruit:nth-child(4) { top: 50%; left: -24px; transform: translateY(-50%); animation-delay: 0.9s; }
  .orbit-fruit:nth-child(5) { top: 14%; right: 14%; animation-delay: 0.15s; }
  .orbit-fruit:nth-child(6) { bottom: 14%; right: 14%; animation-delay: 0.45s; }
  .orbit-fruit:nth-child(7) { bottom: 14%; left: 14%; animation-delay: 0.75s; }
  .orbit-fruit:nth-child(8) { top: 14%; left: 14%; animation-delay: 1.0s; }

  @keyframes fruitBob {
    from { transform: scale(1) translateX(-50%); }
    to { transform: scale(1.15) translateX(-50%); }
  }

  .brand-tag {
    font-family: 'Fredoka One', cursive;
    font-size: 0.85rem;
    letter-spacing: 4px;
    color: rgba(255,200,100,0.7);
    text-transform: uppercase;
    margin-bottom: 8px;
    animation: fadeSlideUp 0.8s ease 0.2s both;
  }

  .game-title {
    font-family: 'Bangers', cursive;
    font-size: clamp(3.5rem, 14vw, 6rem);
    letter-spacing: 6px;
    line-height: 1;
    text-align: center;
    background: linear-gradient(135deg, #ff6b35, #ffd700, #ff1493, #00ffff);
    background-size: 300% 300%;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: titleGlow 2s ease-in-out infinite alternate, fadeSlideUp 0.8s ease 0.4s both, gradientFlow 3s ease infinite;
    filter: drop-shadow(0 0 30px rgba(255,100,50,0.5));
    text-shadow: none;
  }

  @keyframes gradientFlow {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }

  @keyframes titleGlow {
    from { filter: drop-shadow(0 0 20px rgba(255,100,50,0.4)); }
    to { filter: drop-shadow(0 0 50px rgba(255,200,0,0.8)); }
  }

  .subtitle {
    font-family: 'Fredoka One', cursive;
    font-size: 1rem;
    color: rgba(255,255,255,0.5);
    letter-spacing: 3px;
    margin-top: 4px;
    animation: fadeSlideUp 0.8s ease 0.6s both;
  }

  .made-by {
    margin-top: 20px;
    text-align: center;
    animation: fadeSlideUp 0.8s ease 0.8s both;
  }

  .made-by-label {
    font-size: 0.65rem;
    letter-spacing: 5px;
    color: rgba(255,255,255,0.3);
    text-transform: uppercase;
  }

  .made-by-name {
    font-family: 'Bangers', cursive;
    font-size: 1.6rem;
    letter-spacing: 4px;
    background: linear-gradient(90deg, #ff6b35, #ffd700);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .tap-to-play {
    margin-top: 40px;
    font-family: 'Fredoka One', cursive;
    font-size: 1.2rem;
    color: white;
    letter-spacing: 2px;
    animation: fadeSlideUp 0.8s ease 1.2s both, tapPulse 1.2s ease-in-out 1.2s infinite;
    background: linear-gradient(135deg, rgba(255,107,53,0.3), rgba(255,20,147,0.3));
    border: 1px solid rgba(255,200,100,0.4);
    padding: 14px 40px;
    border-radius: 50px;
    backdrop-filter: blur(10px);
  }

  @keyframes tapPulse {
    0%, 100% { transform: scale(1); box-shadow: 0 0 20px rgba(255,150,0,0.3); }
    50% { transform: scale(1.04); box-shadow: 0 0 40px rgba(255,150,0,0.6); }
  }

  @keyframes fadeSlideUp {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .particle-container {
    position: absolute; inset: 0; pointer-events: none; overflow: hidden;
  }

  .spark {
    position: absolute;
    width: 3px; height: 3px;
    border-radius: 50%;
    background: #ffd700;
    animation: sparkFloat linear infinite;
    opacity: 0;
  }

  @keyframes sparkFloat {
    0% { opacity: 0; transform: translateY(0) scale(0); }
    10% { opacity: 1; transform: scale(1); }
    90% { opacity: 0.5; }
    100% { opacity: 0; transform: translateY(-100vh) scale(0.3); }
  }

  /* HUD */
  #hud {
    position: fixed; top: 0; left: 0; right: 0; z-index: 50;
    padding: 16px 20px 0;
    display: flex; justify-content: space-between; align-items: flex-start;
    pointer-events: none;
    display: none;
  }

  .score-box {
    background: rgba(0,0,0,0.5);
    border: 1px solid rgba(255,200,100,0.3);
    border-radius: 16px;
    padding: 8px 18px;
    backdrop-filter: blur(10px);
    text-align: center;
  }

  .score-label {
    font-size: 0.55rem;
    letter-spacing: 3px;
    color: rgba(255,200,100,0.6);
    text-transform: uppercase;
  }

  .score-value {
    font-family: 'Bangers', cursive;
    font-size: 2rem;
    color: #ffd700;
    line-height: 1;
    text-shadow: 0 0 20px rgba(255,200,0,0.5);
  }

  .lives-box {
    display: flex; gap: 6px; align-items: center;
    background: rgba(0,0,0,0.5);
    border: 1px solid rgba(255,100,100,0.3);
    border-radius: 16px;
    padding: 8px 14px;
    backdrop-filter: blur(10px);
  }

  .life-heart {
    font-size: 1.2rem;
    transition: all 0.3s ease;
  }

  .life-heart.lost {
    filter: grayscale(1) opacity(0.3);
    transform: scale(0.8);
  }

  /* GAME OVER */
  #gameover {
    position: fixed; inset: 0; z-index: 80;
    display: none; flex-direction: column;
    align-items: center; justify-content: center;
    background: rgba(0,0,0,0.85);
    backdrop-filter: blur(20px);
  }

  .go-title {
    font-family: 'Bangers', cursive;
    font-size: 4rem;
    letter-spacing: 6px;
    color: #ff1c1c;
    text-shadow: 0 0 40px rgba(255,28,28,0.8);
    animation: goShake 0.6s ease;
  }

  @keyframes goShake {
    0%, 100% { transform: translateX(0); }
    20% { transform: translateX(-10px) rotate(-3deg); }
    40% { transform: translateX(10px) rotate(3deg); }
    60% { transform: translateX(-6px); }
    80% { transform: translateX(6px); }
  }

  .go-score {
    font-family: 'Fredoka One', cursive;
    font-size: 1.1rem;
    color: rgba(255,255,255,0.6);
    margin-top: 10px;
    letter-spacing: 2px;
  }

  .go-final {
    font-family: 'Bangers', cursive;
    font-size: 3rem;
    color: #ffd700;
    text-shadow: 0 0 30px rgba(255,200,0,0.6);
  }

  .go-best {
    font-size: 0.85rem;
    color: rgba(255,200,100,0.5);
    letter-spacing: 2px;
    margin-top: 4px;
  }

  .restart-btn {
    margin-top: 30px;
    font-family: 'Bangers', cursive;
    font-size: 1.5rem;
    letter-spacing: 3px;
    color: white;
    background: linear-gradient(135deg, #ff6b35, #ff1493);
    border: none;
    border-radius: 50px;
    padding: 14px 44px;
    cursor: pointer;
    box-shadow: 0 0 30px rgba(255,100,50,0.5);
    animation: btnPulse 1.5s ease-in-out infinite;
    pointer-events: all;
  }

  @keyframes btnPulse {
    0%, 100% { box-shadow: 0 0 30px rgba(255,100,50,0.5); }
    50% { box-shadow: 0 0 60px rgba(255,100,50,0.9); }
  }

  /* COMBO */
  #combo-display {
    position: fixed; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    font-family: 'Bangers', cursive;
    font-size: 4rem;
    letter-spacing: 4px;
    pointer-events: none;
    z-index: 60;
    opacity: 0;
    transition: none;
  }

  .blade-trail {
    position: fixed; inset: 0; pointer-events: none; z-index: 55;
  }
</style>
</head>
<body>

<!-- SPLASH -->
<div id="splash">
  <div class="splash-bg"></div>
  <div class="particle-container" id="particles"></div>

  <div class="fruit-ring">
    <span class="orbit-fruit">🍎</span>
    <span class="orbit-fruit">🍓</span>
    <span class="orbit-fruit">🍌</span>
    <span class="orbit-fruit">🍉</span>
    <span class="orbit-fruit">🥭</span>
    <span class="orbit-fruit">🍇</span>
    <span class="orbit-fruit">🍊</span>
    <span class="orbit-fruit">🍍</span>
  </div>

  <div style="position:relative; z-index:10; text-align:center; margin-top: 20px;">
    <div class="brand-tag">✦ The Ultimate Fruit Game ✦</div>
    <div class="game-title">SLICE &<br>SPLICE</div>
    <div class="subtitle">SLASH THEM ALL</div>
    <div class="made-by">
      <div class="made-by-label">crafted by</div>
      <div class="made-by-name">MAYANK JAIN</div>
    </div>
    <div class="tap-to-play" id="tapBtn">⚔️  TAP TO PLAY</div>
  </div>
</div>

<!-- HUD -->
<div id="hud">
  <div class="score-box">
    <div class="score-label">Score</div>
    <div class="score-value" id="scoreVal">0</div>
  </div>
  <div class="lives-box" id="livesBox">
    <span class="life-heart" id="h1">❤️</span>
    <span class="life-heart" id="h2">❤️</span>
    <span class="life-heart" id="h3">❤️</span>
  </div>
</div>

<!-- COMBO -->
<div id="combo-display"></div>

<!-- CANVAS -->
<canvas id="gameCanvas"></canvas>

<!-- GAME OVER -->
<div id="gameover">
  <div class="go-title">GAME OVER</div>
  <div class="go-score">YOUR SCORE</div>
  <div class="go-final" id="finalScore">0</div>
  <div class="go-best" id="bestScore">BEST: 0</div>
  <button class="restart-btn" onclick="restartGame()">⚔️ PLAY AGAIN</button>
</div>

<canvas class="blade-trail" id="trailCanvas"></canvas>

<script>
// ============================
// SETUP
// ============================
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const trailCanvas = document.getElementById('trailCanvas');
const tCtx = trailCanvas.getContext('2d');

let W, H;
function resize() {
  W = canvas.width = trailCanvas.width = window.innerWidth;
  H = canvas.height = trailCanvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// ============================
// GAME STATE
// ============================
let score = 0, bestScore = 0, lives = 3;
let gameActive = false;
let fruits = [], particles = [], sliceTrail = [], floatingTexts = [];
let combo = 0, comboTimer = 0;
let spawnInterval = 1200, spawnTimer = 0;
let lastTime = 0, difficulty = 1;

const FRUITS = [
  { emoji: '🍎', name: 'Apple',      color: '#ff3b30', juice: '#ff6b60', score: 1 },
  { emoji: '🍓', name: 'Strawberry', color: '#ff2d55', juice: '#ff6080', score: 2 },
  { emoji: '🍌', name: 'Banana',     color: '#ffcc00', juice: '#ffe066', score: 1 },
  { emoji: '🍉', name: 'Watermelon', color: '#30d158', juice: '#66e080', score: 3 },
  { emoji: '🥭', name: 'Mango',      color: '#ff9500', juice: '#ffb840', score: 2 },
  { emoji: '🍇', name: 'Grapes',     color: '#bf5af2', juice: '#d080ff', score: 2 },
  { emoji: '🍊', name: 'Orange',     color: '#ff9f0a', juice: '#ffbf50', score: 1 },
  { emoji: '🍍', name: 'Pineapple',  color: '#ffd60a', juice: '#ffe566', score: 3 },
  { emoji: '🫐', name: 'Blueberry',  color: '#0a84ff', juice: '#40a0ff', score: 2 },
  { emoji: '🍑', name: 'Peach',      color: '#ff6b35', juice: '#ff9060', score: 2 },
  { emoji: '🍈', name: 'Guava',      color: '#32d74b', juice: '#60e870', score: 3 },
  { emoji: '🍋', name: 'Lemon',      color: '#ffd60a', juice: '#ffe550', score: 1 },
];

// ============================
// SPLASH PARTICLES
// ============================
(function initSplashParticles() {
  const pc = document.getElementById('particles');
  for (let i = 0; i < 35; i++) {
    const s = document.createElement('div');
    s.className = 'spark';
    s.style.left = Math.random() * 100 + '%';
    s.style.top = Math.random() * 100 + '%';
    const dur = 3 + Math.random() * 5;
    const delay = Math.random() * 5;
    s.style.animation = `sparkFloat ${dur}s ${delay}s linear infinite`;
    const colors = ['#ffd700','#ff6b35','#ff1493','#00ffff','#ff4444'];
    s.style.background = colors[Math.floor(Math.random() * colors.length)];
    s.style.width = s.style.height = (2 + Math.random() * 4) + 'px';
    pc.appendChild(s);
  }
})();

// ============================
// START GAME
// ============================
document.getElementById('tapBtn').addEventListener('click', startGame);
document.getElementById('tapBtn').addEventListener('touchstart', e => { e.preventDefault(); startGame(); });

function startGame() {
  document.getElementById('splash').style.transition = 'opacity 0.6s ease';
  document.getElementById('splash').style.opacity = '0';
  setTimeout(() => {
    document.getElementById('splash').style.display = 'none';
    document.getElementById('hud').style.display = 'flex';
    initGame();
    requestAnimationFrame(gameLoop);
  }, 600);
}

function initGame() {
  score = 0; lives = 3; combo = 0;
  fruits = []; particles = []; sliceTrail = []; floatingTexts = [];
  spawnInterval = 1200; spawnTimer = 0; difficulty = 1;
  gameActive = true;
  updateHUD();
  document.getElementById('gameover').style.display = 'none';
}

function restartGame() {
  document.getElementById('gameover').style.display = 'none';
  initGame();
  requestAnimationFrame(gameLoop);
}

// ============================
// FRUIT CLASS
// ============================
class Fruit {
  constructor() {
    this.isBomb = Math.random() < 0.12 + difficulty * 0.02;
    if (!this.isBomb) {
      const f = FRUITS[Math.floor(Math.random() * FRUITS.length)];
      Object.assign(this, f);
    } else {
      this.emoji = '💣'; this.name = 'Bomb';
      this.color = '#333'; this.juice = '#666'; this.score = 0;
    }

    this.size = 44 + Math.random() * 20;
    const edge = Math.random();
    if (edge < 0.8) {
      this.x = 80 + Math.random() * (W - 160);
      this.y = H + this.size;
      const targetX = W * 0.2 + Math.random() * W * 0.6;
      const targetY = H * 0.1 + Math.random() * H * 0.3;
      const dist = Math.hypot(targetX - this.x, targetY - this.y);
      const speed = 8 + Math.random() * 6 + difficulty * 1.5;
      this.vx = (targetX - this.x) / dist * speed;
      this.vy = (targetY - this.y) / dist * speed;
    } else {
      this.x = Math.random() < 0.5 ? -this.size : W + this.size;
      this.y = H * 0.3 + Math.random() * H * 0.4;
      this.vx = this.x < 0 ? 5 + Math.random() * 5 : -(5 + Math.random() * 5);
      this.vy = -(4 + Math.random() * 4);
    }

    this.gravity = 0.25 + difficulty * 0.03;
    this.rotation = (Math.random() - 0.5) * 0.15;
    this.angle = 0;
    this.sliced = false;
    this.alpha = 1;
    this.scale = 0;
    this.scaleDir = 1;
    this.glow = 0;
    this.glowDir = 1;
    this.halfA = null; this.halfB = null;
    this.lifetime = 0;
  }

  update(dt) {
    this.lifetime += dt;
    if (this.scale < 1) this.scale = Math.min(1, this.scale + 0.15);
    this.vy += this.gravity;
    this.x += this.vx;
    this.y += this.vy;
    this.angle += this.rotation;
    this.glow += 0.05 * this.glowDir;
    if (this.glow >= 1 || this.glow <= 0) this.glowDir *= -1;
    if (this.sliced) this.alpha -= 0.04;
    return this.y < H + 100 && this.x > -100 && this.x < W + 100 && this.alpha > 0;
  }

  draw(ctx) {
    ctx.save();
    ctx.globalAlpha = this.alpha;
    ctx.translate(this.x, this.y);
    ctx.rotate(this.angle);
    ctx.scale(this.scale, this.scale);

    if (!this.sliced) {
      // Glow ring
      if (!this.isBomb) {
        const glowSize = this.size * 0.7 + this.glow * 6;
        const glowGrad = ctx.createRadialGradient(0, 0, glowSize * 0.5, 0, 0, glowSize);
        glowGrad.addColorStop(0, this.color + '44');
        glowGrad.addColorStop(1, 'transparent');
        ctx.beginPath();
        ctx.arc(0, 0, glowSize, 0, Math.PI * 2);
        ctx.fillStyle = glowGrad;
        ctx.fill();
      }

      // Shadow
      ctx.shadowColor = this.isBomb ? 'rgba(255,50,50,0.5)' : this.color + '88';
      ctx.shadowBlur = 20;

      // Fruit body
      ctx.beginPath();
      ctx.arc(0, 0, this.size * 0.55, 0, Math.PI * 2);
      const grad = ctx.createRadialGradient(-this.size*0.15, -this.size*0.15, 2, 0, 0, this.size * 0.55);
      if (this.isBomb) {
        grad.addColorStop(0, '#555');
        grad.addColorStop(1, '#111');
      } else {
        grad.addColorStop(0, this.juice);
        grad.addColorStop(0.7, this.color);
        grad.addColorStop(1, this.color + 'bb');
      }
      ctx.fillStyle = grad;
      ctx.fill();
      ctx.shadowBlur = 0;

      // Shine
      if (!this.isBomb) {
        ctx.beginPath();
        ctx.ellipse(-this.size * 0.1, -this.size * 0.22, this.size * 0.12, this.size * 0.07, -0.5, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(255,255,255,0.55)';
        ctx.fill();
      }

      // Emoji
      ctx.font = `${this.size * 0.85}px serif`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.shadowColor = 'transparent';
      ctx.fillText(this.emoji, 0, 0);

      // Bomb fuse spark
      if (this.isBomb) {
        ctx.beginPath();
        ctx.arc(this.size * 0.3, -this.size * 0.45, 4 + Math.random() * 3, 0, Math.PI * 2);
        ctx.fillStyle = `hsl(${40 + Math.random()*20}, 100%, ${60 + Math.random()*20}%)`;
        ctx.fill();
      }
    }

    ctx.restore();
  }
}

// ============================
// HALF FRUIT (after slice)
// ============================
class HalfFruit {
  constructor(fruit, side) {
    this.x = fruit.x; this.y = fruit.y;
    this.emoji = fruit.emoji; this.color = fruit.color;
    this.juice = fruit.juice; this.size = fruit.size * 0.8;
    this.side = side;
    this.vx = fruit.vx + (side === 0 ? -4 : 4) + (Math.random() - 0.5) * 3;
    this.vy = fruit.vy - 2 - Math.random() * 3;
    this.gravity = 0.4;
    this.rotation = side === 0 ? -0.12 : 0.12;
    this.angle = fruit.angle;
    this.alpha = 1;
  }

  update() {
    this.vy += this.gravity;
    this.x += this.vx;
    this.y += this.vy;
    this.angle += this.rotation;
    this.alpha -= 0.018;
    return this.alpha > 0 && this.y < H + 100;
  }

  draw(ctx) {
    ctx.save();
    ctx.globalAlpha = this.alpha;
    ctx.translate(this.x, this.y);
    ctx.rotate(this.angle);

    // Half circle clip
    ctx.beginPath();
    if (this.side === 0) {
      ctx.arc(0, 0, this.size * 0.55, Math.PI * 0.5, Math.PI * 1.5);
    } else {
      ctx.arc(0, 0, this.size * 0.55, -Math.PI * 0.5, Math.PI * 0.5);
    }
    ctx.closePath();
    const grad = ctx.createRadialGradient(0, 0, 2, 0, 0, this.size * 0.55);
    grad.addColorStop(0, this.juice);
    grad.addColorStop(1, this.color);
    ctx.fillStyle = grad;
    ctx.fill();

    // Juice inner
    ctx.beginPath();
    if (this.side === 0) {
      ctx.moveTo(0, -this.size * 0.55);
      ctx.lineTo(0, this.size * 0.55);
    } else {
      ctx.moveTo(0, -this.size * 0.55);
      ctx.lineTo(0, this.size * 0.55);
    }
    ctx.strokeStyle = this.juice + 'cc';
    ctx.lineWidth = 3;
    ctx.stroke();

    ctx.font = `${this.size * 0.75}px serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.globalAlpha = this.alpha * 0.7;
    if (this.side === 0) ctx.scale(-1, 1);
    ctx.fillText(this.emoji, 0, 0);

    ctx.restore();
  }
}

// ============================
// PARTICLE
// ============================
class Particle {
  constructor(x, y, color, type = 'juice') {
    this.x = x; this.y = y; this.color = color; this.type = type;
    const angle = Math.random() * Math.PI * 2;
    const speed = type === 'juice' ? 2 + Math.random() * 6 : 1 + Math.random() * 4;
    this.vx = Math.cos(angle) * speed;
    this.vy = Math.sin(angle) * speed - (type === 'juice' ? 2 : 1);
    this.gravity = 0.2;
    this.size = type === 'juice' ? 3 + Math.random() * 5 : 2 + Math.random() * 4;
    this.alpha = 1;
    this.decay = 0.025 + Math.random() * 0.02;
  }

  update() {
    this.vy += this.gravity;
    this.x += this.vx;
    this.y += this.vy;
    this.alpha -= this.decay;
    this.size *= 0.97;
    return this.alpha > 0;
  }

  draw(ctx) {
    ctx.save();
    ctx.globalAlpha = this.alpha;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
    ctx.fillStyle = this.color;
    ctx.shadowColor = this.color;
    ctx.shadowBlur = 8;
    ctx.fill();
    ctx.restore();
  }
}

// ============================
// FLOATING TEXT
// ============================
class FloatingText {
  constructor(x, y, text, color = '#ffd700', size = 28) {
    this.x = x; this.y = y; this.text = text; this.color = color;
    this.size = size; this.alpha = 1; this.vy = -2.5;
  }
  update() {
    this.y += this.vy;
    this.vy *= 0.94;
    this.alpha -= 0.022;
    return this.alpha > 0;
  }
  draw(ctx) {
    ctx.save();
    ctx.globalAlpha = this.alpha;
    ctx.font = `bold ${this.size}px 'Fredoka One', cursive`;
    ctx.textAlign = 'center';
    ctx.fillStyle = this.color;
    ctx.shadowColor = this.color;
    ctx.shadowBlur = 15;
    ctx.fillText(this.text, this.x, this.y);
    ctx.restore();
  }
}

// ============================
// SLICE TRAIL
// ============================
let pointerX = 0, pointerY = 0, prevPointerX = 0, prevPointerY = 0;
let isSlicing = false;
const trailPoints = [];
const MAX_TRAIL = 18;

function addTrailPoint(x, y) {
  trailPoints.push({ x, y, t: Date.now() });
  if (trailPoints.length > MAX_TRAIL) trailPoints.shift();
}

function drawTrail() {
  tCtx.clearRect(0, 0, W, H);
  if (trailPoints.length < 2 || !isSlicing) return;

  const now = Date.now();
  for (let i = 1; i < trailPoints.length; i++) {
    const p0 = trailPoints[i - 1];
    const p1 = trailPoints[i];
    const age = (now - p1.t) / 200;
    const alpha = Math.max(0, 1 - age);
    const width = (1 - i / trailPoints.length) * 14 + 2;

    tCtx.beginPath();
    tCtx.moveTo(p0.x, p0.y);
    tCtx.lineTo(p1.x, p1.y);
    tCtx.strokeStyle = `hsla(${180 + i * 8}, 100%, 80%, ${alpha})`;
    tCtx.lineWidth = width * alpha;
    tCtx.lineCap = 'round';
    tCtx.shadowColor = '#00ffff';
    tCtx.shadowBlur = 20;
    tCtx.stroke();
  }

  // Glow tip
  if (trailPoints.length > 0) {
    const tip = trailPoints[trailPoints.length - 1];
    const grad = tCtx.createRadialGradient(tip.x, tip.y, 0, tip.x, tip.y, 20);
    grad.addColorStop(0, 'rgba(255,255,255,0.9)');
    grad.addColorStop(0.5, 'rgba(0,255,255,0.4)');
    grad.addColorStop(1, 'transparent');
    tCtx.beginPath();
    tCtx.arc(tip.x, tip.y, 20, 0, Math.PI * 2);
    tCtx.fillStyle = grad;
    tCtx.fill();
  }
}

// ============================
// INPUT
// ============================
function handleMove(x, y) {
  prevPointerX = pointerX; prevPointerY = pointerY;
  pointerX = x; pointerY = y;
  if (isSlicing) {
    addTrailPoint(x, y);
    if (gameActive) checkSlice(prevPointerX, prevPointerY, x, y);
  }
}

canvas.addEventListener('mousedown', e => { isSlicing = true; addTrailPoint(e.clientX, e.clientY); });
canvas.addEventListener('mousemove', e => handleMove(e.clientX, e.clientY));
canvas.addEventListener('mouseup', () => { isSlicing = false; trailPoints.length = 0; });
canvas.addEventListener('touchstart', e => { e.preventDefault(); isSlicing = true; const t = e.touches[0]; addTrailPoint(t.clientX, t.clientY); }, { passive: false });
canvas.addEventListener('touchmove', e => { e.preventDefault(); const t = e.touches[0]; handleMove(t.clientX, t.clientY); }, { passive: false });
canvas.addEventListener('touchend', e => { e.preventDefault(); isSlicing = false; trailPoints.length = 0; });

function checkSlice(x1, y1, x2, y2) {
  let slicedAny = false;
  fruits.forEach(f => {
    if (f.sliced) return;
    const dist = pointToSegmentDist(f.x, f.y, x1, y1, x2, y2);
    if (dist < f.size * 0.55) {
      sliceFruit(f);
      slicedAny = true;
    }
  });
  if (slicedAny) {
    combo++;
    if (combo >= 3) showCombo(combo);
  } else {
    if (combo > 0) combo = 0;
  }
}

function pointToSegmentDist(px, py, x1, y1, x2, y2) {
  const dx = x2 - x1, dy = y2 - y1;
  const lenSq = dx * dx + dy * dy;
  if (lenSq === 0) return Math.hypot(px - x1, py - y1);
  let t = ((px - x1) * dx + (py - y1) * dy) / lenSq;
  t = Math.max(0, Math.min(1, t));
  return Math.hypot(px - (x1 + t * dx), py - (y1 + t * dy));
}

function sliceFruit(f) {
  f.sliced = true;

  if (f.isBomb) {
    // BOMB explosion
    for (let i = 0; i < 30; i++) particles.push(new Particle(f.x, f.y, '#ff3300', 'bomb'));
    for (let i = 0; i < 15; i++) particles.push(new Particle(f.x, f.y, '#ff9900', 'bomb'));
    flashScreen('rgba(255,50,0,0.3)');
    loseLife();
    floatingTexts.push(new FloatingText(f.x, f.y - 20, '💥 BOMB!', '#ff3300', 32));
    return;
  }

  // Juice burst
  for (let i = 0; i < 20; i++) particles.push(new Particle(f.x, f.y, f.juice, 'juice'));
  for (let i = 0; i < 10; i++) particles.push(new Particle(f.x, f.y, f.color, 'juice'));

  // Halves
  fruits.push(new HalfFruit(f, 0));
  fruits.push(new HalfFruit(f, 1));

  // Score
  const pts = f.score * (combo >= 3 ? Math.min(combo, 5) : 1);
  score += pts;
  const scoreColor = combo >= 3 ? '#ff6b35' : '#ffd700';
  const label = combo >= 3 ? `+${pts} 🔥` : `+${pts}`;
  floatingTexts.push(new FloatingText(f.x, f.y - 30, label, scoreColor, 26));
  updateHUD();
}

function loseLife() {
  lives--;
  const hearts = ['h1','h2','h3'];
  if (lives >= 0 && lives < 3) {
    document.getElementById(hearts[lives]).classList.add('lost');
  }
  if (lives <= 0) endGame();
}

let flashAlpha = 0;
function flashScreen(color) {
  flashAlpha = 0.5;
  const flashColor = color;
  function doFlash() {
    if (flashAlpha <= 0) return;
    ctx.save();
    ctx.globalAlpha = flashAlpha;
    ctx.fillStyle = flashColor;
    ctx.fillRect(0, 0, W, H);
    ctx.restore();
    flashAlpha -= 0.06;
  }
  // store for game loop
  window._flashFn = doFlash;
}

function showCombo(n) {
  const el = document.getElementById('combo-display');
  const colors = ['','','','#ff9500','#ff2d55','#bf5af2','#00ffff'];
  const labels = ['','','','TRIPLE!','QUAD!','PENTA!','ULTRA!'];
  const c = Math.min(n, 6);
  el.textContent = labels[c] || `${n}x COMBO!`;
  el.style.color = colors[c] || '#ff2d55';
  el.style.textShadow = `0 0 30px ${colors[c] || '#ff2d55'}`;
  el.style.opacity = '1';
  el.style.transform = 'translate(-50%, -50%) scale(1.3)';
  el.style.transition = 'transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275)';
  setTimeout(() => {
    el.style.opacity = '0';
    el.style.transform = 'translate(-50%, -50%) scale(0.8)';
    el.style.transition = 'all 0.5s ease';
  }, 800);
}

// ============================
// BACKGROUND
// ============================
let bgTime = 0;
function drawBackground(dt) {
  bgTime += dt * 0.001;
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  const hue = (bgTime * 20) % 360;
  grad.addColorStop(0, `hsl(${hue}, 80%, 5%)`);
  grad.addColorStop(0.5, `hsl(${(hue + 30) % 360}, 60%, 8%)`);
  grad.addColorStop(1, `hsl(${(hue + 60) % 360}, 70%, 4%)`);
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  // Stars / shimmer
  ctx.save();
  for (let i = 0; i < 40; i++) {
    const sx = ((i * 137.5) % W);
    const sy = ((i * 97.3) % H);
    const flicker = 0.3 + 0.5 * Math.abs(Math.sin(bgTime * 2 + i));
    ctx.globalAlpha = flicker * 0.4;
    ctx.beginPath();
    ctx.arc(sx, sy, 1.5, 0, Math.PI * 2);
    ctx.fillStyle = 'white';
    ctx.fill();
  }
  ctx.restore();
}

// ============================
// SPAWN
// ============================
function spawnFruit(dt) {
  spawnTimer += dt;
  const interval = Math.max(500, spawnInterval - difficulty * 80);
  if (spawnTimer >= interval) {
    spawnTimer = 0;
    const count = Math.random() < 0.3 ? 2 : 1;
    for (let i = 0; i < count; i++) {
      setTimeout(() => {
        if (gameActive) fruits.push(new Fruit());
      }, i * 200);
    }
    difficulty += 0.015;
  }
}

// ============================
// END GAME
// ============================
function endGame() {
  gameActive = false;
  if (score > bestScore) bestScore = score;
  document.getElementById('finalScore').textContent = score;
  document.getElementById('bestScore').textContent = `BEST: ${bestScore}`;
  document.getElementById('gameover').style.display = 'flex';
}

// ============================
// HUD UPDATE
// ============================
function updateHUD() {
  document.getElementById('scoreVal').textContent = score;
}

// ============================
// GAME LOOP
// ============================
function gameLoop(ts) {
  const dt = Math.min(ts - lastTime, 50);
  lastTime = ts;

  // Background
  drawBackground(dt);

  if (gameActive) spawnFruit(dt);

  // Update & draw fruits
  fruits = fruits.filter(f => {
    if (f instanceof HalfFruit) {
      const alive = f.update();
      if (alive) f.draw(ctx);
      return alive;
    }
    const alive = f.update(dt);
    if (alive) f.draw(ctx);
    else if (!f.sliced && !f.isBomb && gameActive) {
      // Missed fruit
      loseLife();
      floatingTexts.push(new FloatingText(f.x, H - 60, 'MISS!', '#ff3030', 22));
    }
    return alive && !f.sliced;
  });

  // Particles
  particles = particles.filter(p => {
    const alive = p.update();
    if (alive) p.draw(ctx);
    return alive;
  });

  // Floating texts
  floatingTexts = floatingTexts.filter(t => {
    const alive = t.update();
    if (alive) t.draw(ctx);
    return alive;
  });

  // Flash
  if (window._flashFn) { window._flashFn(); if (flashAlpha <= 0) window._flashFn = null; }

  // Trail
  drawTrail();

  requestAnimationFrame(gameLoop);
}
</script>
